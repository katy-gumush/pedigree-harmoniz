<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Pedigree Explorer{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container d-flex flex-wrap align-items-center gap-2">
      <a class="navbar-brand fw-bold mb-0" href="/">🐾 Pedigree Explorer</a>
      {% if dataset_picker_enabled %}
      <form method="post" action="/dataset" class="d-flex align-items-center gap-2 ms-lg-auto ms-0 flex-grow-1 flex-lg-grow-0" style="min-width: 0;">
        <label for="dataset-select" class="text-light small text-nowrap mb-0">Data source</label>
        <select name="dataset" id="dataset-select" data-testid="dataset-select"
                class="form-select form-select-sm bg-dark text-light border-secondary"
                style="max-width: 22rem;" aria-label="Data source" onchange="this.form.submit()">
          {% for opt in dataset_options %}
          <option value="{{ opt.key }}" {% if opt.key == current_dataset %}selected{% endif %}>{{ opt.label }}</option>
          {% endfor %}
        </select>
      </form>
      {% endif %}
    </div>
  </nav>
  <main class="container pb-5">
    {% block content %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>
